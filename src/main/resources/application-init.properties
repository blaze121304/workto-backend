server.port=8080

# ── Image ────────────────────────────────────────────────
app.image.upload-dir=./uploads/images
app.base-url=http://localhost:8080

# ── CORS ─────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173

# ── Datasource (prod MySQL - 데이터 초기화용) ──────────────
spring.datasource.url=jdbc:mysql://192.168.0.206:3306/walking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── H2 Console ───────────────────────────────────────────
spring.h2.console.enabled=false

# ── JPA ──────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
