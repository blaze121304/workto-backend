spring.application.name=workto-backend
port=8080

# ── Datasource (H2 - local) ──────────────────────────────
spring.datasource.url=jdbc:h2:mem:walkdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Console ───────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ──────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── CORS ─────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173

# ── JWT ──────────────────────────────────────────────────
jwt.secret=walkingwalkingwalkingwalkingwalkingwalkingwalkingwalkingwalkingwalkingwalking
jwt.expiration=86400000
