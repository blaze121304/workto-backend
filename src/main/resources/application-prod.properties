spring.config.import=file:/app/keyfile.properties
server.port=10008

# ── CORS ─────────────────────────────────────────────────
cors.allowed-origins=http://192.168.0.206:10009,http://walkto.rusty.it.kr,https://walkto.rusty.it.kr

# ── Datasource (MySQL - prod) ─────────────────────────────
spring.datasource.url=jdbc:mysql://192.168.0.206:3306/walking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── H2 Console (운영에서는 비활성화) ─────────────────────────
spring.h2.console.enabled=false

# ── JPA ──────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=8640000
